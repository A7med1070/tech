<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="معرض أعمال Fresh air للمكيفات المستعملة بالرياض وصور قبل وبعد للصيانة والتنظيف والتركيب.">
  <title>المعرض | Fresh air للمكيفات</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="page-hero" style="--page-img:url('assets/img/central-hvac.jpg')"><div class="container reveal"><p class="eyebrow">المعرض</p><h1>لقطات من أعمالنا وتجهيزاتنا</h1><p class="lead">صور للمكيفات، التركيب، الصيانة، والتنظيف قبل وبعد.</p></div></section>
    <section class="section">
      <div class="container">
        <div class="masonry">
          <div class="card gallery-item" data-lightbox="assets/img/technician-install.jpg"><img src="assets/img/technician-install.jpg" alt="تركيب مكيف"></div>
          <div class="card gallery-item" data-lightbox="assets/img/maintenance-filter.jpg"><img src="assets/img/maintenance-filter.jpg" alt="صيانة مكيف"></div>
          <div class="card gallery-item" data-lightbox="assets/img/armaflex.jpg"><img src="assets/img/armaflex.jpg" alt="تنظيف وتوصيلات مكيف"></div>
          <div class="card gallery-item" data-lightbox="assets/img/split-wall.jpg"><img src="assets/img/split-wall.jpg" alt="سبليت"></div>
          <div class="card gallery-item" data-lightbox="assets/img/window-ac.jpg"><img src="assets/img/window-ac.jpg" alt="شباك"></div>
          <div class="card gallery-item" data-lightbox="assets/img/central-hvac.jpg"><img src="assets/img/central-hvac.jpg" alt="وحدة خارجية"></div>
          <div class="card gallery-item" data-lightbox="assets/img/service-technician.jpg"><img src="assets/img/service-technician.jpg" alt="فني مكيفات"></div>
          <div class="card gallery-item" data-lightbox="assets/img/outdoor-blue-sky.jpg"><img src="assets/img/outdoor-blue-sky.jpg" alt="وحدة خارجية في الهواء"></div>
        </div>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <p class="eyebrow reveal">قبل وبعد</p><h2 class="reveal">فرق واضح في الأداء والنظافة</h2>
        <div class="grid-3">
          <div class="card before-after"><figure><img src="assets/img/old-units.jpg" alt="قبل"><figcaption>قبل</figcaption></figure><figure><img src="assets/img/split-wall.jpg" alt="بعد"><figcaption>بعد</figcaption></figure></div>
          <div class="card before-after"><figure><img src="assets/img/central-hvac.jpg" alt="قبل"><figcaption>قبل</figcaption></figure><figure><img src="assets/img/remote-control.jpg" alt="بعد"><figcaption>بعد</figcaption></figure></div>
          <div class="card before-after"><figure><img src="assets/img/armaflex.jpg" alt="قبل"><figcaption>قبل</figcaption></figure><figure><img src="assets/img/outdoor-blue-sky.jpg" alt="بعد"><figcaption>بعد</figcaption></figure></div>
        </div>
      </div>
    </section>
  </main>
  <footer class="footer"></footer>
  <script src="app.js"></script>
  <script src="content.js"></script>

</html>
